<section class="hero" aria-labelledby="hero-heading">
  <div class="hero__glow" aria-hidden="true"></div>

  <div class="hero__content">
    <!-- <p class="hero__badge">
      <span class="hero__badge-dot" aria-hidden="true"></span>
      {{ 'hero.badge' | translate }}
    </p> -->

    <h1 id="hero-heading" class="hero__title">
      {{ 'hero.title.prefix' | translate }}
      <span class="hero__title-accent hero__title-accent--typed">
        {{ typedLine() }}<span class="hero__cursor" aria-hidden="true"></span>
      </span>
    </h1>

    <p class="hero__lead">
      {{ 'hero.lead' | translate }}
    </p>

    <div class="hero__actions">
      <a class="hero__btn hero__btn--primary" href="#contact">{{ 'hero.cta.primary' | translate }}</a>
      <!-- <a class="hero__btn hero__btn--ghost" href="#portfolio">{{ 'hero.cta.secondary' | translate }}</a> -->
    </div>
  </div>
</section>
