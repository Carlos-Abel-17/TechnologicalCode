<section class="final-cta" id="contact" aria-labelledby="final-cta-heading">
  <div class="final-cta__wrap">
    <div class="final-cta__card">
      <div class="final-cta__card-topline" aria-hidden="true"></div>
      <div class="final-cta__blob final-cta__blob--br" aria-hidden="true"></div>
      <div class="final-cta__blob final-cta__blob--tl" aria-hidden="true"></div>

      <div class="final-cta__content">
        <h2 id="final-cta-heading" class="final-cta__title">{{ 'cta.title' | translate }}</h2>
        <p class="final-cta__lead">
          {{ 'cta.lead' | translate }}
        </p>

        <div class="final-cta__actions">
          <a
            class="final-cta__btn final-cta__btn--whatsapp"
            [href]="whatsappHref"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ 'cta.whatsapp' | translate }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
