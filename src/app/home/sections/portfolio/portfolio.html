<section
  #portfolioSection
  class="portfolio"
  [attr.aria-label]="'portfolio.aria' | translate"
  id="portfolio"
>
  <div class="portfolio__inner">
    <!-- #portfolioTypewriter: el IntersectionObserver usa solo este bloque para arrancar el autoescrito -->
    <div #portfolioTypewriter class="portfolio__intro">
      <div class="portfolio__stack">
      <p
        class="portfolio__lead"
        [style.opacity]="leftOpacity()"
        [style.transform]="'translate3d(0,' + leftLift() + 'px,0)'"
      >
        @for (seg of leftBodySegments(); track $index) {
          <span [class.portfolio__lead-accent]="seg.accent">{{ seg.text }}</span>
        }<span
          class="portfolio__caret"
          [class.portfolio__caret--off]="caretPhase() !== 'left'"
          aria-hidden="true"
        ></span>
      </p>
      <p
        class="portfolio__subtitle"
        [style.opacity]="rightOpacity()"
        [style.transform]="'translate3d(0,' + rightLift() + 'px,0)'"
      >
        {{ rightBodyText() }}<span
          class="portfolio__caret"
          [class.portfolio__caret--off]="caretPhase() !== 'right'"
          aria-hidden="true"
        ></span>
      </p>
      </div>
    </div>

    <div
      class="portfolio__showcase"
      [class.portfolio__showcase--visible]="staticContentVisible()"
      [attr.aria-hidden]="staticContentVisible() ? null : 'true'"
    >
      <div class="portfolio__showcase-copy">
        <h2 class="portfolio__showcase-title">{{ 'portfolio.showcase.title' | translate }}</h2>
        <p class="portfolio__showcase-subtitle">{{ 'portfolio.showcase.subtitle' | translate }}</p>
        <a class="portfolio__cta" href="#contact">{{ 'portfolio.showcase.cta' | translate }}</a>
        <p class="portfolio__showcase-note">{{ 'portfolio.showcase.note' | translate }}</p>
      </div>
      <div class="portfolio__collage" role="group" [attr.aria-label]="'portfolio.showcase.collageImgAlt' | translate">
        <img
          class="portfolio__collage-item portfolio__collage-item--1"
          src="/imgTemplatedsh/dashImg-1.jpg"
          alt=""
          width="800"
          height="500"
          loading="lazy"
          decoding="async"
        />
        <img
          class="portfolio__collage-item portfolio__collage-item--2"
          src="/imgTemplatedsh/dshImg-2.png"
          alt=""
          width="600"
          height="400"
          loading="lazy"
          decoding="async"
        />
        <img
          class="portfolio__collage-item portfolio__collage-item--3"
          src="/imgTemplatedsh/dshImg-3.png"
          alt=""
          width="600"
          height="400"
          loading="lazy"
          decoding="async"
        />
        <img
          class="portfolio__collage-item portfolio__collage-item--4"
          src="/imgTemplatedsh/dshImg-4.png"
          alt=""
          width="600"
          height="400"
          loading="lazy"
          decoding="async"
        />
        <img
          class="portfolio__collage-item portfolio__collage-item--5"
          src="/imgTemplatedsh/dshImg-5.webp"
          alt=""
          width="600"
          height="400"
          loading="lazy"
          decoding="async"
        />
      </div>
    </div>
  </div>
</section>
