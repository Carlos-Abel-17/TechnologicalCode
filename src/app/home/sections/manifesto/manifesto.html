<section class="manifesto" id="process" aria-labelledby="manifesto-heading">
  <div class="manifesto__glow" aria-hidden="true"></div>

  <div class="manifesto__inner">
    <div class="manifesto__grid">
      <div class="manifesto__column manifesto__column--headline">
        <span class="manifesto__eyebrow">{{ i18n.t('manifesto.eyebrow') }}</span>
        <h2 id="manifesto-heading" class="manifesto__title">
          {{ i18n.t('manifesto.title.line1') }}
          <span class="manifesto__title-muted">{{ i18n.t('manifesto.title.muted') }}</span>
        </h2>
      </div>

      <div class="manifesto__column manifesto__column--body">
        <p class="manifesto__text">
          {{ i18n.t('manifesto.body') }}
        </p>

        <div class="manifesto__stats" role="list">
          <div class="manifesto__stat" role="listitem">
            <div class="manifesto__stat-value">
              99.9<span class="manifesto__stat-suffix manifesto__stat-suffix--secondary">%</span>
            </div>
            <div class="manifesto__stat-label">Uptime SLA</div>
          </div>
          <div class="manifesto__stat" role="listitem">
            <div class="manifesto__stat-value">
              250<span class="manifesto__stat-suffix manifesto__stat-suffix--primary">+</span>
            </div>
            <div class="manifesto__stat-label">{{ i18n.t('manifesto.stat2') }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
