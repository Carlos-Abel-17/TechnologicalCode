<header
  class="header"
  [class.header--glass]="headerGlass()"
  [class.header--portfolio-zone]="headerZone.inPortfolioSection() || headerZone.inGanchoSection()"
>
  <div class="header__inner">
    <a routerLink="/" class="header__brand" [attr.aria-label]="'header.brandAria' | translate">
      <img
        class="header__logo"
        [src]="headerLogoSrc()"
        width="36"
        height="36"
        alt=""
      />
      <span class="header__name">TechnologicalCode</span>
    </a>

    <div class="header__actions">
      <button
        type="button"
        class="header__theme"
        (click)="toggleTheme()"
        [attr.aria-label]="themeToggleKey() | translate"
        [attr.title]="themeToggleKey() | translate"
      >
        <span class="material-symbols-outlined header__theme-icon" aria-hidden="true">{{
          theme.theme() === 'dark' ? 'light_mode' : 'dark_mode'
        }}</span>
      </button>
      <app-language-switcher />
      <a class="header__cta" href="#contact">{{ 'header.cta' | translate }}</a>
    </div>
  </div>
</header>
