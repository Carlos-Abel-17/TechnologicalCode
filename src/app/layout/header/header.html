<header class="header">
  <div class="header__inner">
    <a routerLink="/" class="header__brand" [attr.aria-label]="i18n.t('header.brandAria')">
      <img
        class="header__logo"
        src="image-logo/logo_blanco_sin_fondo.png"
        width="36"
        height="36"
        alt=""
      />
      <span class="header__name">TCode</span>
    </a>

    <nav class="header__nav" aria-label="Principal">
      <a class="header__link" href="#services">{{ i18n.t('header.nav.services') }}</a>
      <a class="header__link" href="#portfolio">{{ i18n.t('header.nav.portfolio') }}</a>
      <a class="header__link" href="#process">{{ i18n.t('header.nav.process') }}</a>
    </nav>

    <div class="header__actions">
      <app-language-switcher />
      <a class="header__cta" href="#contact">{{ i18n.t('header.cta') }}</a>
    </div>
  </div>
</header>
