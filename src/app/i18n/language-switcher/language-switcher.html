<div class="lang" role="group" [attr.aria-label]="'header.lang.label' | translate">
  <button
    type="button"
    class="lang__btn"
    [class.lang__btn--active]="active.code() === 'es'"
    (click)="selectLang('es')"
    [attr.aria-pressed]="active.code() === 'es'"
  >
    ES
  </button>
  <button
    type="button"
    class="lang__btn"
    [class.lang__btn--active]="active.code() === 'en'"
    (click)="selectLang('en')"
    [attr.aria-pressed]="active.code() === 'en'"
  >
    EN
  </button>
</div>
